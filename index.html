<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny — Light Meter</title>
  <meta name="description" content="Sunny is a simple, beautiful light meter for your iPhone." />

  <!-- Open Graph -->
  <meta property="og:title" content="Sunny — Light Meter" />
  <meta property="og:description" content="A simple, beautiful light meter for your iPhone." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sunnymeter.app" />
  <meta property="og:image" content="https://sunnymeter.app/sunny-app-icon.png" />

  <link rel="icon" type="image/png" href="sunny-app-icon.png" />
  <link rel="apple-touch-icon" href="sunny-app-icon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EAE7E4;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 500;
      color: #2b2928;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 32px;
      padding: 96px 24px;
    }

    .app-icon {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow: 0 24px 64px rgba(43, 41, 40, 0.18);
      display: block;
    }

    .titles {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    h1 {
      font-size: clamp(48px, 9vw, 96px);
      font-weight: 500;
      color: #2b2928;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: clamp(16px, 2.4vw, 20px);
      font-weight: 500;
      color: #808080;
      max-width: 28ch;
      line-height: 1.45;
    }

    /* ── CTA ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #2b2928;
      color: #EAE7E4;
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      padding: 16px 28px;
      border-radius: 999px;
      transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.15s;
    }

    .cta:hover { opacity: 0.85; transform: translateY(-2px); }
    .cta svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      padding: 40px 24px;
      width: 100%;
    }

    .footer a {
      font-size: 14px;
      font-weight: 500;
      color: #808080;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover { color: #2b2928; }

    .footer .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #bbb9b6;
      flex-shrink: 0;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-icon { animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .titles   { animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
    .cta      { animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
    .footer   { animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <main class="hero">
    <img class="app-icon" src="sunny-app-icon.png" alt="Sunny app icon" />

    <div class="titles">
      <h1>Sunny</h1>
      <p class="tagline">A simple, beautiful light meter for your iPhone.</p>
    </div>

    <!-- TODO: replace href with the real App Store URL once published -->
    <a class="cta" href="https://apps.apple.com/app/sunny" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.95 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.984 4.46z"/></svg>
      Download on the App Store
    </a>
  </main>

  <footer class="footer">
    <a href="privacy.html">Privacy Policy</a>
    <span class="dot"></span>
    <a href="terms.html">Terms of Service</a>
  </footer>

</body>
</html>
